// ── Supabase CRUD helpers ──
async function sbGet(table, options = {}) {
  if (!sbClient) return null;
  let q = sbClient.from(table).select(options.select || '*');
  if (options.order) q = q.order(options.order, { ascending: options.asc ?? true });
  if (options.limit) q = q.limit(options.limit);
  if (options.eq) q = q.eq(options.eq[0], options.eq[1]);
  const { data, error } = await q;
  if (error) console.error(`sbGet ${table}:`, error);
  return data;
}
async function sbInsert(table, row) {
  if (!sbClient) return null;
  const { data, error } = await sbClient.from(table).insert(row).select();
  if (error) console.error(`sbInsert ${table}:`, error);
  return data?.[0];
}
async function sbUpdate(table, id, updates) {
  if (!sbClient) return;
  const { error } = await sbClient.from(table).update(updates).eq('id', id);
  if (error) console.error(`sbUpdate ${table}:`, error);
}
async function sbDelete(table, id) {
  if (!sbClient) return;
  const { error } = await sbClient.from(table).delete().eq('id', id);
  if (error) console.error(`sbDelete ${table}:`, error);
}
async function sbUpsertSetting(key, value) {
  if (!sbClient) return;
  await sbClient.from('app_settings').upsert({ key, value: JSON.stringify(value), updated_at: new Date().toISOString() });
}
async function sbGetSetting(key) {
  if (!sbClient) return null;
  const { data } = await sbClient.from('app_settings').select('value').eq('key', key).single();
  return data ? JSON.parse(data.value) : null;
}

// ── Load all data from Supabase into DB on startup ──
async function syncFromSupabase() {
  if (!sbClient) return;
  try {
    const [leader, target, alerts, notes, news, tasks, skus, faq, chat, kudos] = await Promise.all([
      sbGetSetting('shift_leader'),
      sbGetSetting('month_target'),
      sbGet('alerts', { order: 'created_at', asc: false }),
      sbGet('today_notes', { order: 'created_at', asc: false }),
      sbGet('news', { order: 'created_at', asc: false }),
      sbGet('tasks', { order: 'created_at', asc: false }),
      sbGet('skus', { order: 'name' }),
      sbGet('faq'),
      sbGet('chat_messages', { order: 'created_at', asc: true, limit: 100 }),
      sbGet('kudos', { order: 'created_at', asc: false, limit: 20 }),
    ]);
    if (leader) DB.shiftLeader = leader;
    if (target) DB.monthTarget = target;
    if (alerts) DB.alerts = alerts.map(a => ({ id: a.id, text: a.text }));
    if (notes) DB.todayNotes = notes.map(n => ({ id: n.id, text: n.text, priority: n.priority }));
    if (news) {
      // Also fetch interactions for each news
      const interactions = await sbGet('news_interactions');
      DB.news = news.map(n => ({
        id: n.id, title: n.title, tag: n.tag, body: n.body, img: n.img,
        time: timeAgo(n.created_at), canSignup: n.can_signup,
        readBy: (interactions||[]).filter(i => i.news_id === n.id && i.action === 'read').map(i => i.user_name),
        signups: (interactions||[]).filter(i => i.news_id === n.id && i.action === 'signup').map(i => i.user_name),
      }));
    }
    if (tasks) DB.tasks = tasks.map(t => ({ id: t.id, title: t.title, assignedBy: t.assigned_by, assignedTo: t.assigned_to, due: t.due, status: t.status, priority: t.priority, note: t.note }));
    if (skus) DB.skus = skus.map(s => ({ id: s.id, sku: s.sku, name: s.name, stock: s.stock, location: s.location, price: s.price, note: s.note }));
    if (faq) DB.faq = faq.map(f => ({ id: f.id, q: f.question, a: f.answer, tag: f.tag }));
    if (chat) DB.chat = chat.map(m => ({ id: m.id, user: m.user_name, text: m.text, time: fmtTime(m.created_at), role: m.role }));
    if (kudos) DB.kudos = kudos.map(k => ({ id: k.id, from: k.from_user, to: k.to_user, msg: k.message, sticker: k.sticker, time: timeAgo(k.created_at) }));
    render();
  } catch(e) { console.error('Sync error:', e); }
}

function timeAgo(ts) {
  const d = new Date(ts); const now = new Date();
  const diff = Math.floor((now - d) / 60000);
  if (diff < 1) return 'Vừa xong';
  if (diff < 60) return diff + ' phút';
  if (diff < 1440) return Math.floor(diff/60) + 'h';
  return Math.floor(diff/1440) + ' ngày';
}
function fmtTime(ts) {
  const d = new Date(ts);
  return d.getHours() + ':' + String(d.getMinutes()).padStart(2, '0');
}

// ── Realtime subscriptions ──
function setupRealtime() {
  if (!sbClient) return;
  sbClient.channel('portal-changes')
    .on('postgres_changes', { event: '*', schema: 'public', table: 'chat_messages' }, () => syncFromSupabase())
    .on('postgres_changes', { event: '*', schema: 'public', table: 'tasks' }, () => syncFromSupabase())
    .on('postgres_changes', { event: '*', schema: 'public', table: 'alerts' }, () => syncFromSupabase())
    .on('postgres_changes', { event: '*', schema: 'public', table: 'today_notes' }, () => syncFromSupabase())
    .subscribe();
}

function render(){

  h+=`<button class="ai-fab" onclick="S.aiOpen=!S.aiOpen;render()" title="Trợ lý AI">🤖</button>`;

  return `<div class="ai-panel"><div style="padding:12px 16px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center"><div style="display:flex;align-items:center;gap:8px"><span style="font-size:18px">🤖</span><div><div style="font-size:14px;font-weight:800">Trợ Lý AI</div><div style="font-size:10px;color:var(--sub)">${DB.geminiKey?"Gemini (local key)":isOnline?"Gemini (server)":"Offline (FAQ)"}</div></div></div><button onclick="S.aiOpen=false;render()" style="background:none;border:none;font-size:16px;cursor:pointer;color:var(--sub)">✕</button></div>
  <div class="ai-msgs" id="aiScroll">${S.aiMsgs.map(m=>`<div class="ai-msg ${m.role==="user"?"user":"bot"} ${m.loading?"loading":""}">${esc(m.text)}</div>`).join("")}</div>

async function sendAI(){
  const inp=document.getElementById("aiInput");if(!inp||!inp.value.trim())return;
  const q=inp.value.trim();
  S.aiMsgs.push({role:"user",text:q});
  S.aiMsgs.push({role:"bot",text:"Đang suy nghĩ...",loading:true});
  S.aiLoading=true;render();

  // Build context from DB
  const context=`Bạn là trợ lý AI của TAP Store (cửa hàng bán xịt phòng, nước hoa, sản phẩm ToneLux Personal Color). Trả lời ngắn gọn bằng tiếng Việt.

THÔNG TIN HIỆN TẠI:
- Trưởng ca: ${DB.shiftLeader}
- Target tháng ${DB.monthTarget.month}: ${DB.monthTarget.done}/${DB.monthTarget.target} đơn
- Thông báo: ${DB.alerts.map(a=>a.text).join("; ")}
- Chú ý: ${DB.todayNotes.map(n=>n.text).join("; ")}

FAQ:
${DB.faq.map(f=>"Q: "+f.q+" → A: "+f.a).join("\n")}

SKU hàng hoá:
${DB.skus.map(s=>s.sku+" | "+s.name+" | Tồn:"+s.stock+" | Vị trí:"+s.location).join("\n")}`;

  if(DB.geminiKey || isOnline){
    try{
      let answer;
      // Try Vercel serverless first (key hidden server-side)
      if(isOnline && !DB.geminiKey) {
        const res = await fetch('/api/gemini', {
          method: 'POST', headers: {'Content-Type':'application/json'},
          body: JSON.stringify({prompt: context+"\n\nCâu hỏi nhân viên: "+q})
        });
        const data = await res.json();
        answer = data.answer || data.error || 'Không nhận được phản hồi.';
      } else {
        // Direct Gemini call (with local key)
        const res=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${DB.geminiKey}`,{
          method:"POST",headers:{"Content-Type":"application/json"},
          body:JSON.stringify({contents:[{role:"user",parts:[{text:context+"\n\nCâu hỏi nhân viên: "+q}]}],generationConfig:{maxOutputTokens:500}})
        });
        const data=await res.json();
        answer=data?.candidates?.[0]?.content?.parts?.[0]?.text||"Không nhận được phản hồi.";
      }
      S.aiMsgs.pop();S.aiMsgs.push({role:"bot",text:answer});
    }catch(e){S.aiMsgs.pop();S.aiMsgs.push({role:"bot",text:"Lỗi kết nối API: "+e.message})}
  }else{
    // Offline: search FAQ + SKU
    const lq=q.toLowerCase();
    const faqMatch=DB.faq.find(f=>(f.q+f.a).toLowerCase().includes(lq));
    const skuMatch=DB.skus.find(s=>(s.sku+s.name).toLowerCase().includes(lq));
    let answer="";
    if(faqMatch)answer+=`📖 ${faqMatch.q}\n→ ${faqMatch.a}\n\n`;
    if(skuMatch)answer+=`📦 ${skuMatch.name} (${skuMatch.sku})\nTồn: ${skuMatch.stock} | Vị trí: ${skuMatch.location} | Giá: ${skuMatch.price}`;
    if(!answer)answer="Mình chưa tìm thấy thông tin. Hãy hỏi trưởng ca hoặc nhắn nhóm nhé!\n\n💡 Tip: Thêm Gemini API Key trong Admin Panel để mình thông minh hơn!";
    S.aiMsgs.pop();S.aiMsgs.push({role:"bot",text:answer});
  }
  S.aiLoading=false;render();
}

function searchFAQ(q){const el=document.getElementById("faqList");if(!el)return;const lq=q.toLowerCase();const f=q.trim()?DB.faq.filter(f=>(f.q+f.a+f.tag).toLowerCase().includes(lq)):DB.faq;if(!f.length){el.innerHTML=`<div style="text-align:center;padding:16px;color:var(--sub)">Không tìm thấy</div>`;return}el.innerHTML=f.map(f=>{const idx=DB.faq.indexOf(f);const o=S.openFaq===idx;return`<div class="faq-item ${o?"open":""}"><button class="faq-btn" onclick="S.openFaq=S.openFaq===${idx}?null:${idx};render()"><span class="faq-arrow">›</span><span style="flex:1;font-size:13px;font-weight:700;line-height:1.3">${esc(f.q)}</span><span class="pill ${pillCls(f.tag)}">${f.tag}</span></button><div class="faq-answer">${esc(f.a)}</div></div>`}).join("")}

function addAlert(){const i=document.getElementById("newAlert");if(!i||!i.value.trim())return;const txt=i.value.trim();DB.alerts.push({id:Date.now(),text:txt});if(sbClient)sbInsert('alerts',{text:txt});render()}
function addNote(){const i=document.getElementById("newNote");const p=document.getElementById("notePriority");if(!i||!i.value.trim())return;const txt=i.value.trim();const pri=p?.value||"normal";DB.todayNotes.push({id:Date.now(),text:txt,priority:pri});if(sbClient)sbInsert('today_notes',{text:txt,priority:pri});render()}
function addTask(){const t=document.getElementById("atTitle")?.value?.trim();const to=document.getElementById("atTo")?.value?.trim();if(!t||!to)return;const task={title:t,assignedBy:"Trinh",assignedTo:to,due:document.getElementById("atDue")?.value?.trim()||"—",status:"todo",priority:document.getElementById("atPri")?.value||"normal",note:document.getElementById("atNote")?.value?.trim()||""};DB.tasks.unshift({id:Date.now(),...task});if(sbClient)sbInsert('tasks',{title:task.title,assigned_by:task.assignedBy,assigned_to:task.assignedTo,due:task.due,status:task.status,priority:task.priority,note:task.note});render()}
function addNews(){const t=document.getElementById("anTitle")?.value?.trim();const b=document.getElementById("anBody")?.value?.trim();if(!t||!b)return;const n={title:t,tag:document.getElementById("anTag")?.value||"Tin mới",time:"Vừa đăng",body:b,img:document.getElementById("anImg")?.value?.trim()||"",readBy:[],signups:[],canSignup:document.getElementById("anSignup")?.checked||false};DB.news.unshift({id:Date.now(),...n});if(sbClient)sbInsert('news',{title:n.title,tag:n.tag,body:n.body,img:n.img,can_signup:n.canSignup});render()}
function addSKU(){const c=document.getElementById("asCode")?.value?.trim();const n=document.getElementById("asName")?.value?.trim();if(!c||!n)return;const sku={sku:c,name:n,stock:+(document.getElementById("asStock")?.value||0),location:document.getElementById("asLoc")?.value?.trim()||"—",price:document.getElementById("asPrice")?.value?.trim()||"—",note:document.getElementById("asNote")?.value?.trim()||""};DB.skus.push(sku);if(sbClient)sbInsert('skus',sku);render()}
function addFAQ(){const q=document.getElementById("afQ")?.value?.trim();const a=document.getElementById("afA")?.value?.trim();if(!q||!a)return;const tag=document.getElementById("afTag")?.value||"Quy trình";DB.faq.push({q,a,tag});if(sbClient)sbInsert('faq',{question:q,answer:a,tag});render()}

render();
</script>
